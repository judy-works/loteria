<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lotería</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



<!-- Card + Side Buttons -->
<div id="cardRow">

    <!-- LEFT SIDE: Reiniciar -->
    <button id="resetBtn" class="sideBtn">Reiniciar</button>

    <div id="card">
        <img id="cardImg" src="" alt="">
    </div>

    <!-- RIGHT SIDE: Siguiente -->
    <button id="nextBtn" class="sideBtn">Siguiente</button>

</div>

<!-- Progress Bar -->
<div id="timerContainer">
    <div id="timerBar"></div>
</div>

<!-- Main Controls -->
<div id="mainControls">
    <button id="startAuto">Iniciar</button>
    <button id="stopAuto">Detener</button>
    <button id="historyBtn">Historial</button>
</div>

<!-- Speed Selector -->
<h2>Auto‑Play</h2>
<label for="speed">Velocidad:</label>
<select id="speed">
    <option value="7000" selected>Muy Lento (7s)</option>
    <option value="5000">Lento (5s)</option>
    <option value="3000">Normal (3s)</option>
    <option value="2000">Rápido (2s)</option>
    <option value="1000">Muy Rápido (1s)</option>
</select>

<!-- History Modal -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <h2>Historial de Cartas</h2>
        <ul id="historyList"></ul>
        <button id="closeHistory">Cerrar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
