<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Leticia's Lotería</title>

    <!-- ⭐ CRITICAL FOR MOBILE FIT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ⭐ MOBILE CONTAINER FOR PERFECT FIT -->
<div class="app-container">

    <h1>Leticia's Lotería</h1>

    <div id="card" class="card">
        <img id="cardImg" src="images/00_leticias_loteria.jpg" alt="Lotería Card">
    </div>

    <div class="buttons">
        <button id="resetBtn">Reiniciar</button>
        <button id="nextBtn">Siguiente</button>
        <button id="startAuto">Iniciar</button>
        <button id="stopAuto">Detener</button>
        <button id="historyBtn">Historial</button>
    </div>

    <div class="autoplay">
        <label for="speed">Auto-Play</label>
        <select id="speed">
            <option value="7000">Velocidad: Muy Lento (7s)</option>
            <option value="5000">Lento (5s)</option>
            <option value="3000">Normal (3s)</option>
            <option value="2000">Rápido (2s)</option>
            <option value="1000">Muy Rápido (1s)</option>
        </select>
    </div>

    <div id="timerBar"></div>

    <!-- HISTORY MODAL -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span id="closeHistory" class="close">&times;</span>
            <h2>Historial</h2>
            <ul id="historyList"></ul>
        </div>
    </div>

</div> <!-- END app-container -->

<script src="script.js"></script>
</body>
</html>
