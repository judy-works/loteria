<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Leticia's Lotería</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF8A00">
    <link rel="apple-touch-icon" href="icons/loteria-icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Lotería">
    <link rel="stylesheet" href="style.css">
</head>


<body>
<div class="app-container">

    <!-- CARD WITH PLAY/PAUSE OVERLAY -->
    <div id="card" class="card">
        <img id="cardImg" src="images/00_leticias_loteria.jpg" alt="Lotería Card">
        <div id="playPauseOverlay" class="overlay-icon">▶️</div>
    </div>

    <div class="buttons">
        <button id="resetBtn">Barajar</button>
        <button id="nextBtn">Siguiente</button>
        <button id="historyBtn">Historial</button>
    </div>

    <div class="autoplay">
        <label for="speed">Auto-Play</label>
        <select id="speed">
            <option value="7000">Velocidad: Muy Lento (7s)</option>
            <option value="5000">Lento (5s)</option>
            <option value="3000">Normal (3s)</option>
            <option value="2000">Rápido (2s)</option>
            <option value="1000">Muy Rápido (1s)</option>
        </select>
    </div>

    <div id="timerBar"></div>

    <!-- HISTORY MODAL -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span id="closeHistory" class="close">&times;</span>
            <h2>Historial</h2>
            <ul id="historyList"></ul>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
